# Main site
server {
  listen 80;
  server_name drop.cv www.drop.cv;
  root /var/www/dropcv/frontend;
  index index.html;

  # SPA fallback - all routes serve index.html
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Specific HTML files
  location ~* \.(html|css|js)$ {
    expires 1h;
    add_header Cache-Control "public";
  }
}

# API server
server {
  listen 80;
  server_name api.drop.cv;

  location / {
    proxy_pass http://localhost:3000;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_cache_bypass $http_upgrade;
    client_max_body_size 25M;
  }
}

# Wildcard subdomain routing â€” mahdi-jadidi.drop.cv
server {
  listen 80;
  server_name ~^(?<slug>[a-z0-9\-]+)\.drop\.cv$;
  
  location / {
    # HTML for deployed resumes is generated upstream by Node and already
    # includes the analytics injection snippet before </body>.
    proxy_pass http://localhost:3000;
    proxy_set_header Host $host;
    proxy_set_header X-Slug $slug;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }
}

# MinIO
server {
  listen 80;
  server_name minio.drop.cv;

  location / {
    proxy_pass http://localhost:9000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }
}

